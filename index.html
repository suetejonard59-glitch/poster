<!DOCTYPE html>
<html lang="en">
<head>
    <title>Poster Box · Cloud Collab Gallery (Supabase)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #a8d8ea 0%, #7bc1d9 100%);
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #0e3b4f;
            text-shadow: 2px 2px 0 #cfe8f0;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .sub {
            text-align: center;
            color: #1f5e7a;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .upload-card {
            background: rgba(255, 248, 225, 0.95);
            border-radius: 48px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        .file-label {
            background: #2c7da0;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .file-label:hover {
            background: #1f5f7a;
            transform: scale(1.02);
        }
        #imageFile {
            display: none;
        }
        .title-input {
            flex: 2;
            min-width: 180px;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid #d4bc8a;
            font-size: 0.95rem;
            background: white;
            outline: none;
        }
        .title-input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }
        .save-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .save-btn:hover {
            background: #1b5e20;
            transform: translateY(-2px);
        }
        .poster-box {
            background: #fef7e9;
            border-radius: 32px;
            padding: 20px;
            border: 2px solid #f0daa8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e6cfa0;
        }
        .box-header h2 {
            color: #5a3e1b;
            font-size: 1.5rem;
        }
        .badge-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .count-badge {
            background: #c9aa6f;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
        }
        .refresh-btn {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .refresh-btn:hover {
            background: #1f5f7a;
        }
        .clear-all {
            background: #b5651e;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .clear-all:hover {
            background: #8e4a12;
        }
        .poster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            cursor: pointer;
            background: #f0ede8;
        }
        .card-title {
            font-weight: 800;
            margin: 10px 10px 5px;
            font-size: 0.85rem;
            color: #2d3e2b;
            text-align: center;
            word-break: break-word;
        }
        .card-author {
            font-size: 0.7rem;
            color: #7a6a4a;
            text-align: center;
            margin-bottom: 5px;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 8px 10px 12px;
            flex-wrap: wrap;
        }
        .btn-view {
            background: #6b8c42;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .btn-download {
            background: #2c7da0;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .btn-delete {
            background: #d98f5c;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .btn-view:active, .btn-download:active, .btn-delete:active {
            transform: scale(0.96);
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #b07d48;
            font-size: 1rem;
            background: #fff6e6;
            border-radius: 48px;
            grid-column: 1/-1;
        }
        .loading-state {
            text-align: center;
            padding: 50px 20px;
            color: #5a7a6e;
            font-size: 1rem;
            background: #fff6e6;
            border-radius: 48px;
            grid-column: 1/-1;
        }
        .modal-viewer {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal-viewer.active {
            display: flex;
        }
        .modal-viewer img {
            max-width: 92%;
            max-height: 75%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .modal-caption {
            background: #1e2a1ecc;
            color: #ffecb3;
            padding: 10px 24px;
            border-radius: 60px;
            margin-top: 18px;
            font-weight: bold;
            max-width: 85%;
            text-align: center;
            font-size: 1rem;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 44px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:active {
            background: #c0392b;
        }
        .modal-download-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 26px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e2f;
            color: #f9f3cf;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            z-index: 2100;
            pointer-events: none;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        @media (max-width: 550px) {
            .poster-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            .upload-card {
                flex-direction: column;
                align-items: stretch;
            }
            .toast-msg {
                white-space: normal;
                text-align: center;
                max-width: 90%;
            }
        }
        .device-tag {
            background: #f5e5c8;
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 30px;
            margin-left: 8px;
            color: #7a5800;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h1>📦 POSTER BOX</h1>
    <div class="sub">🎨 by Jonard Suete</div>
    <div class="sub">✨ Shoutout Jesalyn Bermudes ✨</div>    

    <div class="upload-card">
        <label class="file-label" for="imageFile">📸 Pumili ng Larawan</label>
        <input type="file" id="imageFile" accept="image/jpeg,image/png,image/gif,image/webp">
        <input type="text" id="titleInput" class="title-input" placeholder="Pangalan ng poster (opsyonal)">
        <button id="saveBtn" class="save-btn">💾 I-save sa Cloud</button>
    </div>

    <div class="poster-box">
        <div class="box-header">
            <h2>🌐 Mga Poster Ideas (Lahat ng User)</h2>
            <div class="badge-group">
                <span class="count-badge" id="countDisplay">0</span>
                <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
                <button class="clear-all" id="clearBtn">🗑️ Burahin Lahat</button>
            </div>
        </div>
        <div id="grid" class="poster-grid">
            <div class="loading-state">⏳ Naglo-load ng mga poster mula sa cloud...</div>
        </div>
    </div>
</div>

<div id="posterModal" class="modal-viewer">
    <span class="modal-close">&times;</span>
    <img id="modalFullImage" src="" alt="full poster">
    <div id="modalFullTitle" class="modal-caption"></div>
    <button id="modalDownloadFullBtn" class="modal-download-btn">⬇️ I-download ito</button>
</div>

<script>
  
  
      // ============= SUPABASE CONFIGURATION =============
    const SUPABASE_URL = "https://nbvwefoxxloinythwzqy.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_9HZiwgEMiyheCMUNvEIXCA_C4dPvqsQ";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
    
    let postersArray = [];
    let currentModalPoster = null;
    
    // Helper: show toast message
    function showToast(msg, duration = 2800) {
        let old = document.querySelector('.toast-msg');
        if(old) old.remove();
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Device identifier – used to track ownership for deletion (each device can only delete its own uploads)
    function getDeviceId() {
        let deviceId = localStorage.getItem('poster_device_id');
        if (!deviceId) {
            deviceId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('poster_device_id', deviceId);
        }
        return deviceId;
    }
    
    const currentDeviceId = getDeviceId();
    
    // ---------- STORAGE OPERATIONS ----------
    async function uploadImageToStorage(file, fileName) {
        try {
            const { data, error } = await supabase.storage
                .from('poster-images')
                .upload(`public/${fileName}`, file, {
                    cacheControl: '3600',
                    upsert: false
                });
            if (error) {
                console.error('Upload error:', error);
                showToast('Storage error: ' + error.message);
                return null;
            }
            const { data: urlData } = supabase.storage
                .from('poster-images')
                .getPublicUrl(`public/${fileName}`);
            return urlData.publicUrl;
        } catch (err) {
            console.error('Storage upload failed:', err);
            return null;
        }
    }
    
    async function deleteImageFromStorage(fileName) {
        try {
            const { error } = await supabase.storage
                .from('poster-images')
                .remove([`public/${fileName}`]);
            if (error) console.error('Delete from storage error:', error);
        } catch (err) { console.error('Storage delete failed:', err); }
    }
    
    // ---------- DATABASE OPERATIONS ----------
    async function savePosterToDatabase(id, imageUrl, title, author) {
        const { data, error } = await supabase
            .from('posters')
            .insert([{ 
                id: id, 
                image_url: imageUrl, 
                title: title, 
                author: author,
                created_at: new Date().toISOString()
            }]);
        if (error) {
            console.error('Database insert error:', error);
            throw error;
        }
        return data;
    }
    
    async function loadAllPostersFromCloud() {
        try {
            const { data, error } = await supabase
                .from('posters')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) {
                console.error('Load error:', error);
                return [];
            }
            return data || [];
        } catch (err) {
            console.error('Failed to load posters:', err);
            return [];
        }
    }
    
    async function deletePosterFromDatabase(id, imageUrl) {
        let fileName = null;
        if (imageUrl) {
            const urlParts = imageUrl.split('/');
            fileName = urlParts[urlParts.length - 1];
        }
        const { error } = await supabase
            .from('posters')
            .delete()
            .eq('id', id);
        if (error) {
            console.error('Delete from database error:', error);
            throw error;
        }
        if (fileName) {
            await deleteImageFromStorage(fileName);
        }
        return true;
    }
    
    // Delete all posters (global, but only triggered after confirmation)
    async function deleteAllPosters() {
        const allPosters = await loadAllPostersFromCloud();
        for (let poster of allPosters) {
            if (poster.image_url) {
                const urlParts = poster.image_url.split('/');
                const fileName = urlParts[urlParts.length - 1];
                if (fileName) await deleteImageFromStorage(fileName);
            }
        }
        const { error } = await supabase.from('posters').delete().neq('id', '');
        if (error) {
            console.error('Delete all error:', error);
            throw error;
        }
    }
    
    // ---------- DOWNLOAD HELPER ----------
    function downloadPoster(imageUrl, suggestedName) {
        try {
            const link = document.createElement('a');
            link.href = imageUrl;
            link.download = suggestedName || 'poster_image.jpg';
            document.body.appendChild(link);
            link.click();
            setTimeout(() => document.body.removeChild(link), 150);
            showToast('⬇️ Nagda-download: ' + suggestedName);
        } catch(e) {
            console.error("Download error:", e);
            showToast('❌ Download failed');
        }
    }
    
    // ---------- RENDER GRID ----------
    function renderGrid() {
        const gridDiv = document.getElementById('grid');
        const countSpan = document.getElementById('countDisplay');
        countSpan.innerText = postersArray.length;
        
        if (postersArray.length === 0) {
            gridDiv.innerHTML = '<div class="empty-state">🌐 Walang poster sa cloud. Mag-upload ng larawan! 📭</div>';
            return;
        }
        
        let html = '';
        for (let i = 0; i < postersArray.length; i++) {
            const p = postersArray[i];
            const title = p.title || 'Poster idea';
            const author = p.author || 'Anonymous';
            const safeFilename = (title.replace(/[^a-z0-9]/gi, '_') || 'poster') + '.jpg';
            const canDelete = (author === currentDeviceId);
            const authorDisplay = canDelete ? 'Ikaw' : (author.length > 12 ? author.substring(0, 10) + '..' : author);
            
            html += `
                <div class="card" data-poster-id="${p.id}">
                    <img class="card-img" src="${p.image_url}" alt="poster" data-id="${p.id}" loading="lazy">
                    <div class="card-title">📌 ${escapeHtml(title)}</div>
                    <div class="card-author">👤 ${escapeHtml(authorDisplay)}${!canDelete ? '<span class="device-tag">community</span>' : '<span class="device-tag" style="background:#d4e2c6;">ikaw</span>'}</div>
                    <div class="btn-group">
                        <button class="btn-view" data-id="${p.id}">👁️ View</button>
                        <button class="btn-download" data-id="${p.id}" data-filename="${escapeHtml(safeFilename)}">⬇️ Download</button>
                        ${canDelete ? `<button class="btn-delete" data-id="${p.id}">🗑️</button>` : ''}
                    </div>
                </div>
            `;
        }
        gridDiv.innerHTML = html;
        attachCardEvents();
    }
    
    function attachCardEvents() {
        // View buttons
        document.querySelectorAll('.btn-view').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const poster = postersArray.find(p => p.id === id);
                if (poster) openModal(poster);
            });
        });
        // image click
        document.querySelectorAll('.card-img').forEach(img => {
            img.addEventListener('click', (e) => {
                const id = img.getAttribute('data-id');
                const poster = postersArray.find(p => p.id === id);
                if (poster) openModal(poster);
            });
        });

        // download
        document.querySelectorAll('.btn-download').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const filenameAttr = btn.getAttribute('data-filename') || 'poster_art.jpg';
                const poster = postersArray.find(p => p.id === id);
                if (poster && poster.image_url) {
                    downloadPoster(poster.image_url, filenameAttr);
                } else {
                    showToast('❌ Hindi makuha ang larawan');
                }
            });
        });
        // delete
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const posterToDelete = postersArray.find(p => p.id === id);
                if (!posterToDelete) return;
                if (confirm(`Tanggalin ang poster "${posterToDelete.title || 'ito'}"?`)) {
                    try {
                        await deletePosterFromDatabase(id, posterToDelete.image_url);
                        showToast(`✓ Tinanggal: ${posterToDelete.title || 'Poster'}`);
                        await refreshPosterList();
                    } catch (err) {
                        console.error(err);
                        showToast('❌ Nabura ang pagkabura, subukan muli');
                    }
                }
            });
        });
    }
    
    // Modal logic
    function openModal(poster) {
        if (!poster) return;
        currentModalPoster = poster;
        const modal = document.getElementById('posterModal');
        const modalImg = document.getElementById('modalFullImage');
        const modalTitle = document.getElementById('modalFullTitle');
        modalImg.src = poster.image_url;
        modalTitle.innerText = poster.title ? `📌 ${poster.title}` : '📸 Poster (walang pamagat)';
        modal.classList.add('active');
    }
    
    function closeModal() {
        const modal = document.getElementById('posterModal');
        modal.classList.remove('active');
        currentModalPoster = null;
    }
    
    // Refresh list from cloud
    async function refreshPosterList() {
        const gridDiv = document.getElementById('grid');
        gridDiv.innerHTML = '<div class="loading-state">🔄 Binabasa ang cloud gallery...</div>';
        try {
            const posters = await loadAllPostersFromCloud();
            postersArray = posters;
            renderGrid();
            if (posters.length === 0) showToast('✨ Walang poster, mag-upload ng bago!', 2000);
            else showToast(`✅ ${posters.length} poster ang na-load`, 1500);
        } catch (err) {
            console.error(err);
            gridDiv.innerHTML = '<div class="empty-state">⚠️ Error sa pag-load ng data. Subukan muli.</div>';
            showToast('❌ Hindi ma-connect sa cloud');
        }
    }
    
    // ---------- UPLOAD NEW POSTER ----------
    async function handleUpload() {
        const fileInput = document.getElementById('imageFile');
        const titleInput = document.getElementById('titleInput');
        const file = fileInput.files[0];
        if (!file) {
            showToast('📁 Pumili muna ng larawan!');
            return;
        }
        
        // Validate image type
        if (!file.type.startsWith('image/')) {
            showToast('❌ Pumili ng valid na imahe (JPEG, PNG, etc)');
            return;
        }
        
        const title = titleInput.value.trim() === '' ? 'Poster Idea' : titleInput.value.trim();
        const fileExt = file.name.split('.').pop();
        const uniqueId = crypto.randomUUID ? crypto.randomUUID() : Date.now() + '_' + Math.random().toString(36);
        const storageFileName = `${uniqueId}.${fileExt}`;
        
        // Disable save button to avoid double submit
        const saveBtn = document.getElementById('saveBtn');
        const originalText = saveBtn.innerHTML;
        saveBtn.innerHTML = '⏳ Nag-a-upload...';
        saveBtn.disabled = true;
        
        try {
            // 1. upload image to storage
            const publicUrl = await uploadImageToStorage(file, storageFileName);
            if (!publicUrl) {
                showToast('❌ Upload sa storage nabigo');
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
                return;
            }
            // 2. save metadata to posters table
            await savePosterToDatabase(uniqueId, publicUrl, title, currentDeviceId);
            showToast(`🎉 Nai-save ang "${title}" sa cloud!`);
            // clear inputs
            fileInput.value = '';
            titleInput.value = '';
            // refresh gallery
            await refreshPosterList();
        } catch (err) {
            console.error(err);
            showToast('❌ Hindi na-save: ' + (err.message || 'unknown error'));
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = originalText;
        }
    }
    
    // ---------- CLEAR ALL (global delete) with double confirmation ----------
    async function handleClearAll() {
        if (postersArray.length === 0) {
            showToast('Wala pang poster na mabubura.');
            return;
        }
        const confirmMsg = '⚠️ BABALA: Burahin LAHAT ng poster mula sa cloud? Ito ay pang-global at hindi na maibabalik.';
        if (!confirm(confirmMsg)) return;
        const secondConfirm = confirm('I-type ang "DELETE ALL" upang kumpirmahin:');
        if (!secondConfirm) return;
        const typeCheck = prompt('I-type ang "DELETE ALL" upang tuluyang burahin:');
        if (typeCheck !== 'DELETE ALL') {
            showToast('❌ Kinansela. Hindi tugma ang code.');
            return;
        }
        try {
            await deleteAllPosters();
            showToast('🗑️ Lahat ng poster ay permanenteng nabura!');
            await refreshPosterList();
        } catch (err) {
            console.error(err);
            showToast('❌ Error sa pagbura ng lahat');
        }
    }
    
    // ---------- EVENT LISTENERS & INIT ----------
    document.getElementById('saveBtn').addEventListener('click', handleUpload);
    document.getElementById('refreshBtn').addEventListener('click', refreshPosterList);
    document.getElementById('clearBtn').addEventListener('click', handleClearAll);
    
    // Modal close events
    const modal = document.getElementById('posterModal');
    document.querySelector('.modal-close').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    // Download inside modal
    const modalDownloadBtn = document.getElementById('modalDownloadFullBtn');
    modalDownloadBtn.addEventListener('click', () => {
        if (currentModalPoster && currentModalPoster.image_url) {
            let fileName = (currentModalPoster.title || 'poster').replace(/[^a-z0-9]/gi, '_') + '.jpg';
            downloadPoster(currentModalPoster.image_url, fileName);
        } else {
            showToast('Walang larawang ma-download');
        }
    });
    
    // Keyboard ESC close modal
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });
    
    // initial load
    refreshPosterList().catch(console.warn);
</script>
</body>
</html>
